<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAsk 1</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color:rgb(21, 21, 21);
            transform: scale(1.05);
           
        }

        button:hover {  
            background-color:black;
             color: white;
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <button>click me </button>
    </div>
</body>

</html>
